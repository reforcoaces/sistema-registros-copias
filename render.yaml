# Web Service: no Render, New > Web Service > conecte este repositorio GitHub.
# Build / Start abaixo. O app grava pedidos em APP_STORAGE_PATH e usuarios em APP_USERS_PATH.
#
# Plano FREE: filesystem e efemero — orders.json e users.json funcionam ate redeploy,
# restart ou spin-down; depois voltam vazios/padrao. Disco persistente NAO esta disponivel no free.
# Para dados reais persistentes: use instancia paga + Disk (mount ex.: /var/data) e mantenha os paths abaixo.
services:
  - type: web
    name: sistema-registros-copias
    env: java
    plan: free
    buildCommand: mvn clean package
    startCommand: java -jar target/sistema-registros-copias-0.0.1-SNAPSHOT.jar
    envVars:
      - key: APP_STORAGE_PATH
        value: /var/data/orders.json
      - key: APP_USERS_PATH
        value: /var/data/users.json
