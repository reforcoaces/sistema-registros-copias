spring.application.name=sistema-registros-copias
server.port=${PORT:8080}

# MySQL — sem segredos aqui. Defina SPRING_DATASOURCE_PASSWORD no ambiente ou use
# application-local.properties na raiz do projeto (ver application-local.properties.example).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sistema_copias?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Opcional: ficheiro na raiz do repo (gitignored) com spring.datasource.password=...
spring.config.import=optional:file:./application-local.properties
