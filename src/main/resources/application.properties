spring.application.name=sistema-registros-copias
server.port=${PORT:8080}

# MySQL (crie a base antes ou use createDatabaseIfNotExist na URL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sistema_copias?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
# Em producao use SPRING_DATASOURCE_PASSWORD (nao commite segredos em repositorio publico).
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:portaria}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
