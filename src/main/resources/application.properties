spring.application.name=sistema-registros-copias
server.port=${PORT:8080}
app.storage.path=${APP_STORAGE_PATH:data/orders.json}
app.users.path=${APP_USERS_PATH:data/users.json}

# Reforco Aces (JSON em data/)
app.reforco.alunos.path=${APP_REFORCO_ALUNOS_PATH:data/alunos.json}
app.reforco.atividades.path=${APP_REFORCO_ATIVIDADES_PATH:data/atividades.json}
app.reforco.agenda.path=${APP_REFORCO_AGENDA_PATH:data/agenda-semana.json}

# Copia os JSON de dados para esta pasta logo apos cada gravacao pela app (opcional).
# Ex.: APP_BACKUP_FOLDER=C:\\Users\\voce\\OneDrive\\Documentos\\base-de-dados
app.backup.folder=${APP_BACKUP_FOLDER:}

# E-mail (opcional). Sem spring.mail.host o agendamento apenas registra em log.
# app.notification.to=reforco.aces@gmail.com
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=seu@gmail.com
# spring.mail.password=senha-de-app
app.notification.to=${APP_NOTIFICATION_TO:reforcoescolar.aces@gmail.com}
