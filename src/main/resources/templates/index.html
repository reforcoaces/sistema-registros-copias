<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Atendimento</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container">
    <h1>Novo Atendimento</h1>
    <header class="app-toolbar" th:if="${currentUser != null}">
        <div class="app-toolbar__user">
            <span>Usuario: <strong th:text="${currentUser.username}"></strong></span>
            <span>Perfil: <strong th:text="${currentUser.role}"></strong></span>
        </div>
        <nav class="app-toolbar__nav">
            <button type="button" class="btn-nav btn-nav--secondary" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href='/'; }">Voltar</button>
            <a class="btn-nav btn-nav--secondary" th:if="${currentUser.role.name() == 'ADMIN'}" href="/usuarios">Usuarios</a>
            <a class="btn-nav btn-nav--danger" href="/logout">Sair</a>
        </nav>
    </header>

    <section class="card">
        <h2>Tabela de precos</h2>
        <ul class="price-list">
            <li class="price-list__row" th:each="p : ${productTypes}">
                <span class="price-list__name" th:text="${p.descricao}">Produto</span>
                <span class="price-list__price" th:text="${'R$ ' + #numbers.formatDecimal(p.unitPrice, 1, 2)}">R$ 0,00</span>
            </li>
        </ul>
    </section>

    <section class="card">
        <form th:object="${orderForm}" method="post" id="order-form" th:attr="data-product-prices=${productPricesJson}">
            <div class="error-box" th:if="${#fields.hasAnyErrors()}">
                <p>Corrija os erros abaixo:</p>
                <ul>
                    <li th:each="e : ${#fields.errors('*')}" th:text="${e}"></li>
                </ul>
            </div>

            <div class="grid header">
                <strong>Produto</strong>
                <strong>Quantidade</strong>
                <strong>Acoes</strong>
            </div>

            <div class="grid row order-row" th:each="item, stat : *{items}">
                <select th:field="*{items[__${stat.index}__].productType}">
                    <option value="">Selecione</option>
                    <option th:each="product : ${productTypes}"
                            th:value="${product}"
                            th:text="${product.descricao + ' - R$ ' + #numbers.formatDecimal(product.unitPrice, 1, 2)}">
                    </option>
                </select>
                <input type="number" min="1" th:field="*{items[__${stat.index}__].quantity}">
                <button type="submit"
                        class="danger"
                        th:formaction="@{/pedido/remover-item(index=${stat.index})}">
                    Remover item
                </button>
            </div>

            <div class="payment-box">
                <label for="paymentMethod">Meio de pagamento</label>
                <select id="paymentMethod" th:field="*{paymentMethod}">
                    <option value="">Selecione</option>
                    <option th:each="payment : ${paymentMethods}"
                            th:value="${payment}"
                            th:text="${payment.descricao}"></option>
                </select>
            </div>

            <div class="total-box">
                <span>Total do atendimento:</span>
                <strong id="total-atendimento" th:text="${'R$ ' + #numbers.formatDecimal(total, 1, 2)}">R$ 0,00</strong>
            </div>

            <div class="actions">
                <button type="submit" formaction="/pedido/adicionar-item" class="secondary">Adicionar mais produto</button>
                <button type="submit" formaction="/pedido/recalcular">Atualizar total</button>
                <button type="submit" formaction="/pedido/finalizar" class="btn-success">Finalizar pedido</button>
            </div>
        </form>
    </section>

    <nav class="nav-row" aria-label="Atalhos">
        <a class="btn-nav" href="/dashboard">Dashboard</a>
        <a class="btn-nav" href="/pedidos">Ver historico de pedidos</a>
        <a class="btn-nav" href="/relatorios">Ver relatorios</a>
        <a class="btn-nav btn-nav--muted" th:if="${currentUser != null and currentUser.role.name() == 'ADMIN'}" href="/importacao">Importacao retroativa</a>
        <a class="btn-nav btn-nav--secondary" href="/escolher-sistema?trocar=1">Trocar sistema</a>
    </nav>
</main>
<script th:src="@{/js/pedido-form-total.js}" defer></script>
</body>
</html>
