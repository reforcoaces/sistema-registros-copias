<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<th:block th:replace="~{fragments/app-status-bar :: bar}"></th:block>
<main class="container">
    <h1>Administracao de Usuarios</h1>
    <nav class="nav-row" aria-label="Atalhos">
        <a class="btn-nav btn-nav--secondary" href="/">Inicio</a>
        <a class="btn-nav" href="/dashboard">Dashboard</a>
        <a class="btn-nav" href="/pedidos">Pedidos</a>
        <a class="btn-nav btn-nav--secondary" href="/escolher-sistema?trocar=1">Trocar sistema</a>
        <a class="btn-nav btn-nav--danger" href="/logout">Sair</a>
    </nav>

    <section class="card success-box" th:if="${param.sucessoCriacao}">
        Usuario criado com sucesso.
    </section>
    <section class="card success-box" th:if="${param.sucessoSenha}">
        Senha alterada com sucesso.
    </section>
    <section class="card error-box" th:if="${error}" th:text="${error}"></section>

    <section class="card">
        <h2>Usuarios cadastrados</h2>
        <table>
            <thead>
            <tr>
                <th>Usuario</th>
                <th>Perfil</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.username}"></td>
                <td th:text="${u.role}"></td>
            </tr>
            </tbody>
        </table>
    </section>

    <section class="card">
        <h2>Criar usuario</h2>
        <form method="post" action="/usuarios/criar">
            <label>Usuario</label>
            <input name="username" required>
            <label>Senha</label>
            <input name="password" type="password" required>
            <label>Perfil</label>
            <select name="role" required>
                <option value="COLABORADOR">COLABORADOR</option>
                <option value="ADMIN">ADMIN</option>
            </select>
            <div class="actions" style="grid-template-columns: 1fr; margin-top: 8px;">
                <button type="submit">Criar usuario</button>
            </div>
        </form>
    </section>

    <section class="card">
        <h2>Alterar senha</h2>
        <form method="post" action="/usuarios/senha">
            <label>Usuario</label>
            <input name="username" required>
            <label>Nova senha</label>
            <input name="password" type="password" required>
            <div class="actions" style="grid-template-columns: 1fr; margin-top: 8px;">
                <button type="submit">Alterar senha</button>
            </div>
        </form>
    </section>
</main>
<th:block th:replace="~{fragments/app-footer :: voltarInferior}"></th:block>
<script th:src="@{/js/app-ui.js}" defer></script>
</body>
</html>
