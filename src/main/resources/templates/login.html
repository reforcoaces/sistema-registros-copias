<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<th:block th:replace="~{fragments/app-status-bar :: bar}"></th:block>
<main class="container">
    <h1>Login do Sistema</h1>
    <section class="card">
        <form method="post" action="/login">
            <label for="username">Usuario</label>
            <input id="username" name="username" required>

            <label for="password">Senha</label>
            <input id="password" type="password" name="password" required>

            <div class="actions" style="grid-template-columns: 1fr; margin-top: 8px;">
                <button type="submit">Entrar</button>
            </div>
        </form>
        <div class="error-box" th:if="${error}" th:text="${error}" style="margin-top: 8px;"></div>
    </section>
</main>
<th:block th:replace="~{fragments/app-footer :: voltarInferior}"></th:block>
<script th:src="@{/js/app-ui.js}" defer></script>
</body>
</html>
