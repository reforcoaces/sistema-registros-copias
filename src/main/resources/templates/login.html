<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<th:block th:replace="~{fragments/app-status-bar :: bar}"></th:block>
<main class="container">
    <h1>Login do Sistema</h1>
    <section class="card">
        <form method="post" action="/login">
            <label for="username">Usuario</label>
            <input id="username" name="username" required>

            <label for="password">Senha</label>
            <div class="password-field">
                <input id="password" type="password" name="password" required autocomplete="current-password">
                <button type="button" class="password-field__toggle" id="toggle-password" aria-label="Mostrar senha" aria-pressed="false" title="Mostrar senha">
                    <span class="password-field__icon password-field__icon--show" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </span>
                    <span class="password-field__icon password-field__icon--hide" aria-hidden="true" hidden>
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </span>
                </button>
            </div>

            <div class="actions" style="grid-template-columns: 1fr; margin-top: 8px;">
                <button type="submit">Entrar</button>
            </div>
        </form>
        <div class="error-box" th:if="${error}" th:text="${error}" style="margin-top: 8px;"></div>
    </section>
</main>
<th:block th:replace="~{fragments/app-footer :: voltarInferior}"></th:block>
<script th:src="@{/js/app-ui.js}" defer></script>
</body>
</html>
