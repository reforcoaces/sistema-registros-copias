<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<main class="dashboard-wrap">
    <h1>Dashboard</h1>
    <header class="app-toolbar" th:if="${currentUser != null}">
        <div class="app-toolbar__user">
            <span>Usuario: <strong th:text="${currentUser.username}"></strong></span>
        </div>
        <nav class="app-toolbar__nav">
            <button type="button" class="btn-nav btn-nav--secondary" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href='/'; }">Voltar</button>
            <a class="btn-nav btn-nav--secondary" th:if="${currentUser.role.name() == 'ADMIN'}" href="/usuarios">Usuarios</a>
            <a class="btn-nav btn-nav--danger" href="/logout">Sair</a>
        </nav>
    </header>
    <nav class="nav-row" aria-label="Atalhos" th:if="${currentUser != null}">
        <a class="btn-nav btn-nav--secondary" href="/">Novo atendimento</a>
        <a class="btn-nav" href="/pedidos">Historico</a>
        <a class="btn-nav" href="/relatorios">Relatorios</a>
        <a class="btn-nav btn-nav--muted" th:if="${currentUser.role.name() == 'ADMIN'}" href="/importacao">Importacao retroativa</a>
    </nav>

    <div class="dash-grid">
        <div class="dash-card dash-blue">
            <span class="dash-label">Faturamento hoje</span>
            <span class="dash-value" th:text="${'R$ ' + #numbers.formatDecimal(stats.todayRevenue, 1, 2)}">R$ 0</span>
        </div>
        <div class="dash-card dash-green">
            <span class="dash-label">Faturamento mes atual</span>
            <span class="dash-value" th:text="${'R$ ' + #numbers.formatDecimal(stats.monthRevenue, 1, 2)}">R$ 0</span>
        </div>
        <div class="dash-card dash-orange">
            <span class="dash-label">Pedidos hoje</span>
            <span class="dash-value" th:text="${stats.ordersToday}">0</span>
        </div>
        <div class="dash-card dash-purple">
            <span class="dash-label">Pedidos no mes</span>
            <span class="dash-value" th:text="${stats.ordersMonth}">0</span>
        </div>
        <div class="dash-card dash-teal">
            <span class="dash-label">Ticket medio (mes)</span>
            <span class="dash-value" th:text="${'R$ ' + #numbers.formatDecimal(stats.averageTicketMonth, 1, 2)}">R$ 0</span>
        </div>
    </div>

    <section class="card dash-section">
        <h2>Ultimos 7 dias (faturamento)</h2>
        <div class="dash-bars">
            <div class="dash-bar-col" th:each="bar : ${stats.last7Days}">
                <div class="dash-bar" th:style="'height:' + ${bar.barPercent} + '%'"></div>
                <span class="dash-bar-label" th:text="${bar.label}"></span>
                <span class="dash-bar-amt" th:text="${'R$ ' + #numbers.formatDecimal(bar.amount, 1, 2)}"></span>
            </div>
        </div>
    </section>

    <section class="card dash-section">
        <h2>Faturamento por pagamento (mes atual)</h2>
        <div class="dash-pay-grid" th:if="${!stats.paymentMonthTotals.isEmpty()}">
            <div class="dash-pay-chip" th:each="e : ${stats.paymentMonthTotals}">
                <strong th:text="${e.key}">Pix</strong>
                <span th:text="${'R$ ' + #numbers.formatDecimal(e.value, 1, 2)}"></span>
            </div>
        </div>
        <p th:if="${stats.paymentMonthTotals.isEmpty()}">Sem dados no mes.</p>
    </section>
</main>
</body>
</html>
